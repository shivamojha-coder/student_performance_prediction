{% extends "base.html" %}
{% block title %}Set New Password — SuccessPredict{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-hero" style="background: radial-gradient(ellipse at center, #1a2a4a 0%, #050b14 100%);">
        <canvas id="particleCanvas" class="hero-particles"></canvas>
        <div class="hero-content" style="text-align:center; max-width:600px; margin:auto;">
            <div class="hero-brand" style="justify-content:center; margin-bottom:20px;">
                <div class="hero-brand-icon">
                     <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
                        <path d="M3 17L9 11L13 15L21 7" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M17 7H21V11" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <span class="hero-brand-text">SuccessPredict</span>
            </div>
            <h1 class="hero-headline" style="font-size:2rem; margin-bottom:10px;">Security Check</h1>
            <p class="hero-desc" style="margin:auto; font-size:1rem;">Ensure your new password is strong.</p>
        </div>
    </div>

    <div class="login-form-panel">
        <div class="login-card-perspective">
            <div class="login-card">
                 <div class="slide-viewport" style="height:auto;">
                    <div class="slide-panel" style="width:100%; opacity:1;">
                        <div class="card-header-row">
                            <h2 class="card-title">Set New Password</h2>
                            <p class="card-subtitle">Create a new password for your account.</p>
                        </div>

                        <form method="POST" action="{{ url_for('reset_password', token=token) }}" class="login-form">
                            <div class="field-group">
                                <label class="field-label">New Password</label>
                                <div class="field-input">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" name="password" placeholder="At least 6 characters" required minlength="6">
                                </div>
                            </div>

                            <div class="field-group">
                                <label class="field-label">Confirm Password</label>
                                <div class="field-input">
                                    <i class="fas fa-lock"></i>
                                    <input type="password" name="confirm_password" placeholder="Re-enter password" required minlength="6">
                                </div>
                            </div>

                            <button type="submit" class="submit-btn">Update Password</button>
                        </form>
                    </div>
                 </div>
            </div>
        </div>
    </div>
</div>
<script>
/* Reuse particle script for consistency */
(function() {
    const canvas = document.getElementById('particleCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W, H;
    const particles = [];
    const COUNT = 40;

    function resize() {
        const rect = canvas.parentElement.getBoundingClientRect();
        W = canvas.width = rect.width;
        H = canvas.height = rect.height;
    }
    window.addEventListener('resize', resize);
    resize();

    for (let i = 0; i < COUNT; i++) {
        particles.push({
            x: Math.random() * W,
            y: Math.random() * H,
            r: Math.random() * 2 + 1,
            dx: (Math.random() - 0.5) * 0.2,
            dy: (Math.random() - 0.5) * 0.2
        });
    }

    function draw() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = 'rgba(200, 230, 255, 0.4)';
        particles.forEach(p => {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fill();
            p.x += p.dx;
            p.y += p.dy;
            if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
            if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        });
        requestAnimationFrame(draw);
    }
    draw();
})();
</script>
{% endblock %}
