{% extends "base.html" %}
{% block title %}PredictorHub | Dashboard{% endblock %}

{% block head %}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='student-dashboard/dashboard.css') }}">
<style>
.student-layout .student-main {
    max-width: none !important;
    width: 100% !important;
    margin: 0 !important;
    padding: 18px 24px 24px !important;
}

.student-main {
    background:
        radial-gradient(80rem 50rem at 90% -10%, rgba(15, 139, 141, 0.08), transparent 70%),
        radial-gradient(60rem 40rem at -10% 30%, rgba(255, 127, 80, 0.08), transparent 72%),
        #f8f7f3;
}

#student-dashboard-root {
    width: 100%;
}

.student-topnav {
    background: rgba(248, 247, 243, 0.8) !important;
    border-bottom: 1px solid rgba(31, 42, 49, 0.08) !important;
    backdrop-filter: blur(14px);
}

.student-nav a.active {
    border-bottom-color: #0f8b8d !important;
}

@media (max-width: 1024px) {
    .student-layout .student-main {
        padding: 14px 16px 18px !important;
    }
}
</style>
{% endblock %}

{% block content %}
<div id="student-dashboard-root"></div>
<div id="student-csrf-token" data-token="{{ csrf_token() }}" hidden></div>
<script id="student-dashboard-data" type="application/json">
{{ dashboard_payload | tojson }}
</script>
{% endblock %}

{% block scripts %}
<script type="module" src="{{ url_for('static', filename='student-dashboard/dashboard.js') }}"></script>
{% endblock %}
